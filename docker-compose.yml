services:
  solver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akira-turnstile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BROWSER_HEADLESS: "false"
    cap_add:
      - SYS_ADMIN       # required for user namespace
    security_opt:
      - seccomp:./chrome-seccomp.json  # custom profile
    expose:
      - "4557"
    networks:
      - akira-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: turnstile-cloudflared
    restart: unless-stopped
    depends_on:
      - solver
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    networks:
      - akira-net

networks:
  akira-net:
    driver: bridge